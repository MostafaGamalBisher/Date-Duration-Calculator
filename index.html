<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Date Duration Calculator</title>
    <link rel="icon" href="./src/assets/img/icons/calendar-color-icon.svg" />
    <link rel="stylesheet" href="./dist/css/main.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <h1 class="hero-title">Date Duration Calculator</h1>
      </header>

      <main class="claculator">
        <form action="" class="card-form">
          <div class="date">
            <h2 class="refrance">Start Date:</h2>
            <div class="input-container">
              <label for="startDay" class="date-label">Day</label>
              <input
                id="startDay"
                name="day"
                type="number"
                class="date-input"
                placeholder="- -"
                min="0"
              />
              <span class="vlaidation-message">must be a valid day</span>
            </div>

            <div class="input-container">
              <label for="startMonth" class="date-label">Month</label>
              <input
                id="startMonth"
                name="month"
                type="number"
                class="date-input"
                placeholder="- -"
                min="0"
              />
              <span class="vlaidation-message">must be a valid month</span>
            </div>

            <div class="input-container">
              <label for="startYear" class="date-label">Year</label>
              <input
                id="startYear"
                name="year"
                type="number"
                class="date-input"
                placeholder="- - - -"
                min="0"
              />
              <span class="vlaidation-message">must be a valid year</span>
            </div>
          </div>

          <div class="date">
            <h2 class="refrance">End Date:</h2>
            <div class="input-container">
              <label for="endDay" class="date-label">Day</label>
              <input
                id="endDay"
                name="day"
                type="number"
                class="date-input"
                placeholder="- -"
                min="0"
              />
              <span class="vlaidation-message">must be a valid day</span>
            </div>

            <div class="input-container">
              <label for="endMonth" class="date-label">Month</label>
              <input
                id="endMonth"
                name="month"
                type="number"
                class="date-input"
                placeholder="- -"
                min="0"
              />
              <span class="vlaidation-message">must be a valid month</span>
            </div>

            <div class="input-container">
              <label for="endYear" class="date-label">Year</label>
              <input
                id="endYear"
                name="year"
                type="number"
                class="date-input"
                placeholder="- - - -"
                min="0"
              />
              <span class="vlaidation-message">must be a valid year</span>
            </div>
          </div>
          <div class="short-cuts">
            <div class="short-cuts-checkbox">
              <input class="checkbox" id="current-date" type="checkbox" />
              <label for="current-date" class="checkmark"></label>
              <label class="checkbox-label" for="current-date"
                >Current Date</label
              >
            </div>
            <div class="short-cuts-checkbox">
              <input class="checkbox" id="working-date" type="checkbox" />
              <label for="working-date" class="checkmark"></label>
              <label class="checkbox-label" for="working-date"
                >Start Date Working Day</label
              >
            </div>
            <button class="button">Calculate</button>
          </div>
        </form>
      </main>

      <article class="result-primary">
        <h3 class="result-primary-title">Duration</h3>
        <div class="result-primary-container">
          <div class="result-column">
            <h3 class="result-title">Years</h3>
            <span class="result"> - - - - </span>
          </div>
          <div class="result-column">
            <h3 class="result-title">Months</h3>
            <span class="result"> - - </span>
          </div>
          <div class="result-column">
            <h3 class="result-title">Days</h3>
            <span class="result"> - - </span>
          </div>
        </div>
      </article>
      <article class="result-secondary">
        <div class="result-primary-container">
          <div class="result-column">
            <h3 class="result-title">In Years</h3>
            <span class="result"> - - - - </span>
          </div>
          <div class="result-column">
            <h3 class="result-title">In Months</h3>
            <span class="result"> - - </span>
          </div>
          <div class="result-column">
            <h3 class="result-title">In Days</h3>
            <span class="result"> - - </span>
          </div>
        </div>
      </article>
      <footer></footer>
    </div>
    <script type="module" src="dist/js/main.js"></script>
  </body>
</html>
